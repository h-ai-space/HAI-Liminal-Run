<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H/AI — Liminal Run</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="start" class="screen active">
    <div class="hero-panel">
      <div class="title">
        <div class="small">prototype visuel</div>
        <h1>H/AI</h1>
        <h2>Liminal Run</h2>
        <p>Un petit jeu d’énigmes entre monde réel, monde artificiel et souvenirs humains.</p>
        <button id="play">Commencer</button>
        <p class="controls">← → pour bouger · ESPACE pour interagir</p>
      </div>
    </div>
  </div>

  <div id="game" class="screen">
    <div id="hud">
      <div><span>Zone</span><b id="zone">Le Réel</b></div>
      <div><span>Fragments</span><b id="life">3/3</b></div>
      <div><span>Objectif</span><b id="objective">Trouve le robot différent</b></div>
    </div>

    <canvas id="canvas" width="1280" height="720"></canvas>
    <div id="hint">ESPACE pour interagir</div>
  </div>

  <div id="modal" class="hidden">
    <div class="box">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <div id="choices"></div>
    </div>
  </div>

  <div id="ending" class="screen">
    <div class="ending-card">
      <h1>Tu as résisté</h1>
      <p>L’Avatar n’a pas pu remplacer ton choix.</p>
      <button onclick="location.reload()">Rejouer</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
